# Ci for Product Catalog Service

name: product-catalogue-ci
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Go 1.22
      uses: actions/setup-go@v2
      with:
        go-version: 1.22
    
    - name: Build the application
      run: |
        cd src/product-catalog
        go mod download
        go build -o product-catalog-service main.go

    - name: Unit tests
      run: |
        cd src/product-catalog
        go test ./...
    
  Code-Quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run golangci-lint
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        golangci-lint run src/product-catalog/...
  
  Docker:
    runs-on: ubuntu-latest
    needs: Build
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: src/product-catalog/
        dockerfile: Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}

  UpdateK8S:
    runs-on: ubuntu-latest
    needs: Docker
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: update tag in kubernetes deployment manifest
      run: |
        sed -i "s|image: .*$|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}|g" kubernetes/productcatalog/deploy.yaml
      # sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{github.run_id}}|" kubernetes/productcatalog/deploy.yaml

    - name: Commit and push changes
      run: |
        git config --global user.name "ravilankagl"
        git config --global user.email "ravilankagl@gmail.com"
        git add kubernetes/productcatalog/deploy.yaml
        git commit -m "[CI]: Update Docker image tag to ${{ secrets.DOCKER_USERNAME }}/product-catalog:${{ github.run_id }}"
        git push origin main

